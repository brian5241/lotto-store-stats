name: Weekly lotto data update

on:
  schedule:
    # 매주 일요일 09:00 KST (00:00 UTC) - 토요일 추첨 이후 여유를 두고 실행
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new rounds
        run: python fetch_rounds.py update

      - name: Rebuild reports
        run: python analyze.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: weekly data update"
          git push
